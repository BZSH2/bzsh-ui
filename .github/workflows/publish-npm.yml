name: Publish to NPM registry
on:
  workflow_run:
    workflows:
      - Create GitHub Release
    types:
      - completed

permissions:
  contents: read

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Detect version change
        id: version
        shell: bash
        run: |
          current_version=$(node -e "console.log(JSON.parse(require('fs').readFileSync('packages/ui/package.json', 'utf8')).version)")
          previous_version=""

          if git cat-file -e "HEAD^:packages/ui/package.json" 2>/dev/null; then
            previous_version=$(git show "HEAD^:packages/ui/package.json" | node -e "let data=''; process.stdin.on('data', chunk => data += chunk); process.stdin.on('end', () => console.log(JSON.parse(data).version))")
          fi

          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "previous_version=$previous_version" >> "$GITHUB_OUTPUT"

          if [ "$current_version" = "$previous_version" ]; then
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check release exists
        if: steps.version.outputs.version_changed == 'true'
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="v${{ steps.version.outputs.current_version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.version.outputs.version_changed == 'true' && steps.release.outputs.exists == 'true'
        uses: pnpm/action-setup@v5

      - name: Setup Node
        if: steps.version.outputs.version_changed == 'true' && steps.release.outputs.exists == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        if: steps.version.outputs.version_changed == 'true' && steps.release.outputs.exists == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.version.outputs.version_changed == 'true' && steps.release.outputs.exists == 'true'
        run: pnpm build

      - name: Publish Packages
        if: steps.version.outputs.version_changed == 'true' && steps.release.outputs.exists == 'true'
        run: pnpm release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.BZSH_UI_TOKEN }}
