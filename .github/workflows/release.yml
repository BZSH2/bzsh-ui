name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    if: "${{ !contains(github.event.head_commit.message, '[skip ci]') }}"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Detect Changesets
        id: detect_changesets
        run: |
          count=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Version Packages
        if: steps.detect_changesets.outputs.has_changesets == 'true'
        run: pnpm version-packages

      - name: Publish Packages
        if: steps.detect_changesets.outputs.has_changesets == 'true'
        run: pnpm release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.BZSH_UI_TOKEN }}

      - name: Commit Release Changes
        if: steps.detect_changesets.outputs.has_changesets == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "chore: release packages [skip ci]"
          git push --follow-tags origin master
